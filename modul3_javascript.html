<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Modul 3 - JavaScript Form</title>

    <style>
        /* =========================
           GLOBAL STYLE
        ==========================*/
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 600px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* =========================
           FORM STYLE (DESKTOP)
        ==========================*/
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* =========================
           OUTPUT SECTION
        ==========================*/
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9f5ff;
            border-left: 5px solid #007BFF;
            display: none;
        }

        /* =========================
           RESPONSIVE (MOBILE)
        ==========================*/
        @media (max-width: 768px) {
            body {
                padding: 20px;
                height: auto;
            }

            .container {
                width: 100%;
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            input, textarea {
                font-size: 16px;
            }
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Form Kontak</h1>

    <form id="contactForm">
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="nama" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Pesan</label>
            <textarea id="pesan" required></textarea>
        </div>

        <button type="submit">Kirim</button>
    </form>

    <div class="result" id="resultBox"></div>
</div>

<script>
    // Ambil elemen form
    const form = document.getElementById("contactForm");

    // Event submit
    form.addEventListener("submit", function(event) {
        event.preventDefault(); // Mencegah reload halaman

        // Ambil nilai input
        const nama = document.getElementById("nama").value;
        const email = document.getElementById("email").value;
        const pesan = document.getElementById("pesan").value;

        // Tampilkan hasil
        const resultBox = document.getElementById("resultBox");
        resultBox.style.display = "block";
        resultBox.innerHTML = `
            <h3>Data yang Anda Masukkan:</h3>
            <p><strong>Nama:</strong> ${nama}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Pesan:</strong> ${pesan}</p>
        `;

        // Reset form setelah submit
        form.reset();
    });
</script>

</body>
</html>
