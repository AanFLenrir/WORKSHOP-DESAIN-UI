<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Modul 3 - JavaScript Form</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 700px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .header {
            background: #0b3c5d;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header p {
            opacity: 0.85;
            font-size: 14px;
        }

        .content {
            padding: 25px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full {
            grid-column: span 2;
        }

        label {
            margin-bottom: 5px;
            font-weight: 600;
            color: #9fa100;
        }

        input, textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #b5c7d3;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0f3955;
            box-shadow: 0 0 0 2px rgba(34, 92, 131, 0.15);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            grid-column: span 2;
            padding: 13px;
            border: none;
            border-radius: 6px;
            background: #0b3c5d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #082f48;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(22, 22, 22, 0.35);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: #eef4f8;
            border-left: 5px solid #0b3c5d;
            display: none;
        }

        .result h3 {
            margin-bottom: 10px;
            color: #0b3c5d;
        }

        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .full, button {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Form Kontak</h1>
        <p>Silakan isi data Anda dengan benar</p>
    </div>

    <div class="content">
        <form id="contactForm">
            <div class="form-group">
                <label>Nama</label>
                <input type="text" id="nama" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group full">
                <label>Pesan</label>
                <textarea id="pesan" required></textarea>
            </div>

            <button type="submit">Kirim Pesan</button>
        </form>

        <div class="result" id="resultBox"></div>
    </div>
</div>

<script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nama = document.getElementById("nama").value;
        const email = document.getElementById("email").value;
        const pesan = document.getElementById("pesan").value;

        const resultBox = document.getElementById("resultBox");
        resultBox.style.display = "block";
        resultBox.innerHTML = `
            <h3>Data Terkirim</h3>
            <p><strong>Nama:</strong> ${nama}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Pesan:</strong> ${pesan}</p>
        `;

        form.reset();
    });
</script><script src="javas.js"></script>

</body>
</html>
